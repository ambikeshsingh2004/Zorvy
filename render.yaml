services:
  - type: web
    name: finance-dashboard
    env: node
    # Uses the single deployment pipeline we established
    buildCommand: npm run install:all && npm run build:frontend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # You will provide this securely in the platform dashboard
      - key: JWT_SECRET
        generateValue: true # Some platforms like Render auto-generate this securely for you
