services:
  - type: web
    name: zorv-finance-dashboard
    env: node
    region: singapore   # closest to India for lowest latency
    plan: free
    buildCommand: cd backend && npm install && cd ../frontend && npm install --include=dev && npm run build
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # Set this manually in Render dashboard > Environment
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random string

